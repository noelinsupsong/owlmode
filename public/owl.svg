<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Ear tufts -->
  <rect x="6" y="2" width="3" height="3" fill="#7c2d12"/>
  <rect x="23" y="2" width="3" height="3" fill="#7c2d12"/>

  <!-- Outer head/body silhouette -->
  <rect x="5" y="5" width="22" height="3" fill="#7c2d12"/>
  <rect x="4" y="6" width="24" height="22" fill="#92400e"/>
  <rect x="5" y="28" width="22" height="2" fill="#7c2d12"/>

  <!-- Face plate (lighter) -->
  <rect x="7" y="9" width="18" height="9" fill="#fbbf24"/>

  <!-- Eyes (white circles) -->
  <rect x="9" y="10" width="6" height="6" fill="#fff"/>
  <rect x="17" y="10" width="6" height="6" fill="#fff"/>
  <!-- Pupils -->
  <rect x="11" y="11" width="3" height="3" fill="#0a0a0a"/>
  <rect x="19" y="11" width="3" height="3" fill="#0a0a0a"/>
  <!-- Pupil highlights -->
  <rect x="12" y="11" width="1" height="1" fill="#fff"/>
  <rect x="20" y="11" width="1" height="1" fill="#fff"/>

  <!-- Beak -->
  <rect x="14" y="16" width="4" height="2" fill="#f97316"/>
  <rect x="15" y="18" width="2" height="1" fill="#ea580c"/>

  <!-- Belly -->
  <rect x="9" y="20" width="14" height="6" fill="#fbbf24"/>
  <rect x="11" y="22" width="2" height="1" fill="#92400e"/>
  <rect x="15" y="22" width="2" height="1" fill="#92400e"/>
  <rect x="19" y="22" width="2" height="1" fill="#92400e"/>
  <rect x="13" y="24" width="2" height="1" fill="#92400e"/>
  <rect x="17" y="24" width="2" height="1" fill="#92400e"/>

  <!-- Feet -->
  <rect x="11" y="29" width="3" height="2" fill="#f97316"/>
  <rect x="18" y="29" width="3" height="2" fill="#f97316"/>
</svg>
